name: Update WeekBox data

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Update data submodule
        run: git submodule update --remote app/src/data

      - name: Commit updated data reference
        run: |
          if git diff --quiet -- app/src/data; then
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/src/data
          git commit -m 'Update WeekBox data'
          git push
