<!-- public/launcher/src/html/engines.html -->
<div class="engines-layout">
    <div class="engines-scroll-area">
        <header class="engines-header">
            <h1 id="engine-display-title">Select an Engine</h1>
            <p id="engine-display-version" class="badge">Version: --</p>
        </header>
        
        <section class="engines-info-section">
            <div id="engine-release-notes" class="markdown-body">
                <p style="color: var(--text-muted);">Fetching release notes...</p>
            </div>
            <div id="engine-options"></div>
        </section>
    </div>

    <!-- ZONA DE PROGRESO DE DESCARGA (Estado Global) -->
    <div id="download-ui" class="download-ui-container" style="display: none;">
        <div class="dl-info-row">
            <span class="dl-status-text" id="dl-text">Fetching data...</span>
            <div class="download-actions" id="dl-actions">
                <button id="dl-pause" class="dl-btn">Pause</button>
                <button id="dl-cancel" class="dl-btn cancel">Cancel</button>
            </div>
        </div>
        <!-- Barra de progreso de 2px -->
        <div class="progress-bar-container">
            <div class="progress-fill" id="dl-fill" style="width: 0%;"></div>
        </div>
    </div>

    <!-- Barra inferior fijada -->
    <div class="engine-fixed-bottom">
        <div class="engine-bottom-content">
            <div class="engine-status">
                <img id="engine-bottom-icon" src="" class="engine-icon" style="display: none;">
                
                <div class="engine-version-dropdown custom-dropdown" id="engine-version-dropdown">
                    <label>Version:</label>
                    <div class="custom-select-trigger" id="engine-version-trigger">
                        <span id="engine-version-selected">Loading...</span>
                        <i class="fa-solid fa-chevron-up"></i>
                    </div>
                    <div class="custom-options-container" id="engine-version-options"></div>
                </div>
            </div>
            
            <!-- Botón principal 100% limpio (sin íconos) -->
            <button class="launch-btn" id="launch-engine-btn">Download</button>
        </div>
    </div>
</div>
