<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Please wait...</title>
</head>
<body>
    <div class="pbarFill">

    </div>
</body>
<style>
    .pbarFill {
        height: 10px;
        width: 0;
        background-color: #4caf50;
        position: absolute;
        bottom: 0;
        left: 0;
        transition: width 0.3s ease-in-out;
    }
    body {
        gap: 20px;
        background-color: #f0f0f0;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100%;
        margin: 0;
        padding: 0;

        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }
</style>
<script>
    window.progress = function (value) {
        const progressBarFill = document.querySelector('.pbarFill');
        progressBarFill.style.width = value + '%';
    }
    document.querySelector('body').style.backgroundImage = `url('${new URLSearchParams(window.location.search).get('img') || 'dl.svg'}')`;
    document.querySelector('body').style.backgroundSize = 'cover';
    document.querySelector('body').style.backgroundPosition = 'center';
    document.querySelector('body').style.backgroundRepeat = 'no-repeat';

    document.title = new URLSearchParams(window.location.search).get('title') || 'Please wait...';
</script>
</html>
