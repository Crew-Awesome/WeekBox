<div class="setup-loader">
    <div class="setup-background"></div>
    
    <img src="../../../assets/icons/launcher-icon.png" class="launcher-logo" alt="Launcher Logo" />
    
    <div id="setup-window-progress-text">Starting the launcher</div>
    
    <div class="md3-component-circle-load" 
         id="loader-determinate"
         data-mode="determinate"
         data-size="80" 
         data-gap="0.06" 
         data-wavelength="15" 
         data-amplitude="3" 
         data-color="var(--primary)"
         data-track-color="var(--surface-container-highest)"
         role="progressbar" 
         aria-label="Loading progress">
    </div>
</div>
