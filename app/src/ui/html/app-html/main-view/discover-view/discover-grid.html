<style>
    .download-dropdown {
        display: none; /* hidden by default */
        position: absolute;
        bottom: calc(100% + 4px); /* pop up above the button */
        right: 0;
        background: var(--m3-sys-light-surface-container-high, #2b2b2b);
        border: 1px solid var(--m3-sys-light-outline-variant, #444);
        border-radius: 12px;
        box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        padding: 8px;
        z-index: 100;
        min-width: 220px;
        max-height: 200px;
        overflow-y: auto;
        flex-direction: column;
        gap: 4px;
    }
    
    .download-dropdown.show {
        display: flex;
        animation: fadeInDown 0.2s ease-out;
    }
    
    .download-dropdown-item {
        background: transparent;
        border: none;
        color: var(--m3-sys-light-on-surface, #e0e0e0);
        padding: 10px 12px;
        text-align: left;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s ease;
        display: flex;
        flex-direction: column;
        gap: 2px;
    }
    
    .download-dropdown-item:hover {
        background: var(--m3-sys-light-surface-variant, #3a3a3a);
    }
    
    .dropdown-item-name {
        font-weight: 500;
        font-size: 0.9em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
    }
    
    .dropdown-item-size {
        font-size: 0.75em;
        opacity: 0.7;
    }

    @keyframes fadeInDown {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    .mod-actions {
        z-index: 20 !important;
        position: relative;
    }
</style>

<div class="discover-grid-container" id="mods-grid">
    <!-- El contenido se generará dinámicamente aquí usando el Web Component <mod-card> -->
</div>

<template id="mod-card-template">
    <div class="md3-component-card md3-component-card--clickable" data-type="dynamic-color">
        <div class="card-badge-engine">Engine</div>
        <img class="mod-thumbnail" src="" alt="Mod Thumbnail" crossorigin="anonymous">
        <div class="card-content">
            <h3 class="mod-title">Title</h3>
            <p class="mod-author-stats">Author • Views</p>
            <div class="mod-actions" style="position: relative;">
                <button class="download-btn">Descargar</button>
                <div class="download-dropdown">
                    <!-- Opciones se inyectarán aquí -->
                </div>
            </div>
        </div>
    </div>
</template>
